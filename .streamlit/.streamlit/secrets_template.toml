# API Keys
[api]
GEMINI_API_KEY = "your-gemini-api-key-here"

# Email Configuration (Optional)
[email]
SMTP_SERVER = "smtp.gmail.com"
SMTP_PORT = 587
SENDER_EMAIL = "your-email@gmail.com"
SENDER_PASSWORD = "your-app-password" # For Gmail, use an App Password

# Instructions:
# 1. Rename this file to "secrets.toml"
# 2. Fill in your actual API key and email credentials
# 3. For Gmail, you need to enable 2FA and generate an App Password
#    (Go to your Google Account > Security > App Passwords)
# 4. Keep this file private and don't commit it to version control
